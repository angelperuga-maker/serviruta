<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Agenda · Serviruta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0D;--s1:#111114;--s2:#16161B;--s3:#1C1C23;--line:#26262E;--rojo:#E8210A;--rojo-l:#FF4D2E;--verde:#22C55E;--amarillo:#F5C518;--azul:#60A5FA;--naranja:#FB923C;--t1:#F6F4EF;--t2:#C7C5BF;--t3:#8B8990;--t4:#56555C;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t2);font-family:var(--body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
.bar{position:sticky;top:0;z-index:50;background:rgba(10,10,13,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px}
.back{font-family:var(--mono);font-size:11px;color:var(--t3);padding:6px 10px;border:1px solid var(--line);border-radius:6px}
.title{font-family:var(--display);font-weight:800;font-size:15px;color:var(--t1);flex:1}
.sigil{width:32px;height:32px;background:var(--rojo);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:14px;color:#fff}
.shell{max-width:900px;margin:0 auto;padding:20px 16px 80px}

/* Date picker */
.fecha-bar{background:var(--s1);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.fecha-nav{width:36px;height:36px;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--t1);font-size:18px}
.fecha-nav:hover{background:var(--s2);border-color:var(--rojo)}
.fecha-info{flex:1;text-align:center}
.fecha-dia{font-family:var(--display);font-weight:800;font-size:18px;color:var(--t1)}
.fecha-sub{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:0.05em;margin-top:2px}
.fecha-hoy{font-family:var(--mono);font-size:10px;background:var(--rojo);color:#fff;padding:4px 10px;border-radius:999px;letter-spacing:0.1em;font-weight:700}

/* Eventos */
.dia-resumen{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:0 4px}
.cuenta{font-family:var(--display);font-weight:700;font-size:13px;color:var(--t1)}
.cuenta b{color:var(--rojo-l)}
.btn-nuevo{background:var(--rojo);color:#fff;border-radius:10px;padding:10px 18px;font-family:var(--display);font-weight:800;font-size:12px;letter-spacing:0.05em;display:flex;align-items:center;gap:6px;min-height:42px}
.btn-nuevo:hover{background:var(--rojo-l)}

.eventos{display:flex;flex-direction:column;gap:10px}
.evento{background:var(--s1);border:1px solid var(--line);border-radius:12px;padding:14px;display:grid;grid-template-columns:70px 1fr auto;gap:14px;align-items:center;transition:all 120ms}
.evento:hover{background:var(--s2);border-color:var(--rojo);cursor:pointer}
.hora{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--t1);text-align:center}
.hora-est{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:0.1em;margin-top:2px}
.evento-body{min-width:0}
.evento-cliente{font-family:var(--display);font-weight:700;font-size:14px;color:var(--t1);margin-bottom:2px}
.evento-meta{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.evento-tag{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:999px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;margin-right:6px}
.tag-agendado{background:rgba(96,165,250,0.15);color:var(--azul)}
.tag-confirmado{background:rgba(34,197,94,0.15);color:var(--verde)}
.tag-en-ruta{background:rgba(251,146,60,0.15);color:var(--naranja)}
.tag-completado{background:rgba(167,139,250,0.15);color:#A78BFA}
.tag-cancelado{background:rgba(232,33,10,0.15);color:var(--rojo-l)}
.estado-icon{width:32px;height:32px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:14px}

.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:0.3}
.empty-titulo{font-family:var(--display);font-weight:700;font-size:16px;color:var(--t1);margin-bottom:6px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--line);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal-bg{align-items:center;padding:20px}.modal{border-radius:18px}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.modal-titulo{font-family:var(--display);font-weight:800;font-size:18px;color:var(--t1)}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;color:var(--t2)}
.modal-close:hover{background:var(--rojo);color:#fff}

.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:0.1em;margin-bottom:6px;text-transform:uppercase;font-weight:700}
.field input,.field select,.field textarea{width:100%;background:var(--s2);border:1px solid var(--line);border-radius:8px;padding:11px 14px;color:var(--t1);font-size:14px;transition:border 120ms}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--rojo)}
.field textarea{min-height:60px;resize:vertical;font-family:inherit}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.tec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.tec-chip{background:var(--s2);border:1px solid var(--line);border-radius:8px;padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 120ms;min-height:48px}
.tec-chip:hover{border-color:var(--line)}
.tec-chip.selected{background:rgba(232,33,10,0.12);border-color:var(--rojo)}
.tec-chip input{display:none}
.tec-chip-dot{width:10px;height:10px;border-radius:50%;background:var(--t4);flex-shrink:0}
.tec-chip.selected .tec-chip-dot{background:var(--rojo)}
.tec-chip-nombre{font-size:12px;color:var(--t1);font-weight:600}

.btn-guardar{width:100%;background:var(--rojo);color:#fff;border-radius:10px;padding:14px;font-family:var(--display);font-weight:800;font-size:14px;letter-spacing:0.05em;margin-top:8px;min-height:50px}
.btn-guardar:hover{background:var(--rojo-l)}
.btn-guardar:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{width:100%;background:transparent;border:1px solid var(--line);color:var(--t2);border-radius:10px;padding:12px;font-size:13px;margin-top:10px}
.btn-secondary:hover{border-color:var(--rojo);color:var(--rojo-l)}

.diag{background:var(--s3);border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:12px;display:none}
.diag.show{display:block}
.diag.error{border-color:var(--rojo);background:rgba(232,33,10,0.08);color:var(--rojo-l)}
.diag.ok{border-color:var(--verde);background:rgba(34,197,94,0.08);color:var(--verde)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--line);border-radius:10px;padding:14px 20px;font-size:13px;font-weight:600;color:var(--t1);opacity:0;transition:all 250ms;pointer-events:none;z-index:200;max-width:90%;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--verde);color:var(--verde)}
.toast.err{border-color:var(--rojo);color:var(--rojo-l);background:rgba(232,33,10,0.1)}
.toast.warn{border-color:var(--amarillo);color:var(--amarillo)}

.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;background:var(--rojo);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:300;box-shadow:0 4px 20px rgba(232,33,10,0.4);z-index:40;cursor:pointer;border:none}
.fab:hover{background:var(--rojo-l);transform:scale(1.05)}
</style>
</head>
<body>

<header class="bar">
  <button class="back" onclick="history.back()">← Volver</button>
  <div class="sigil">S</div>
  <div class="title" id="page-title">Agenda</div>
</header>

<div class="shell">

  <!-- Selector de fecha -->
  <div class="fecha-bar">
    <button class="fecha-nav" onclick="cambiarDia(-1)">‹</button>
    <div class="fecha-info">
      <div class="fecha-dia" id="fecha-dia">—</div>
      <div class="fecha-sub" id="fecha-sub">—</div>
    </div>
    <button class="fecha-nav" onclick="cambiarDia(1)">›</button>
  </div>

  <!-- Resumen + Botón nuevo -->
  <div class="dia-resumen">
    <div class="cuenta"><b id="num-eventos">0</b> servicios <span id="cuenta-sub">agendados</span></div>
    <button class="btn-nuevo" id="btn-nuevo" onclick="abrirNuevo()">+ Nuevo</button>
  </div>

  <!-- Lista de eventos -->
  <div class="eventos" id="eventos"></div>

</div>

<!-- Botón flotante para móvil -->
<button class="fab" onclick="abrirNuevo()" title="Nuevo evento">+</button>

<!-- Modal nuevo evento -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-titulo">Nuevo agendamiento</div>
      <button class="modal-close" onclick="cerrarModal()">×</button>
    </div>

    <div class="row">
      <div class="field">
        <label>Fecha *</label>
        <input type="date" id="f-fecha">
      </div>
      <div class="field">
        <label>Hora *</label>
        <input type="time" id="f-hora" value="09:00">
      </div>
    </div>

    <div class="field">
      <label>Técnicos asignados *</label>
      <div class="tec-grid" id="tec-grid"></div>
    </div>

    <div class="field">
      <label>Cliente *</label>
      <input type="text" id="f-cliente" placeholder="Nombre del cliente">
    </div>

    <div class="row">
      <div class="field">
        <label>Teléfono</label>
        <input type="tel" id="f-tel" placeholder="+56 9 ...">
      </div>
      <div class="field">
        <label>Vehículo</label>
        <input type="text" id="f-vehiculo" placeholder="Marca / patente">
      </div>
    </div>

    <div class="field">
      <label>Servicio</label>
      <input type="text" id="f-servicio" placeholder="Ej: cambio embrague, frenos, etc.">
    </div>

    <div class="field">
      <label>Dirección</label>
      <input type="text" id="f-direccion" placeholder="Comuna / dirección de visita">
    </div>

    <div class="field">
      <label>Notas (opcional)</label>
      <textarea id="f-notas" placeholder="Observaciones..."></textarea>
    </div>

    <button class="btn-guardar" id="btn-g" onclick="guardar()">Agendar servicio</button>
    <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>

    <div class="diag" id="diag"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==========================================
// CONFIG
// ==========================================
var SB_URL='https://bqlgfmqcefledqyodkii.supabase.co'
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxbGdmbXFjZWZsZWRxeW9ka2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTAxMjUsImV4cCI6MjA5NTE2NjEyNX0.m_XyXsZ84niHcHrKNgHSDSS8DxpR7vnHhMfQJk7yM_s'

var TECNICOS=[
  {nombre:'Reynaldo Aguas Bertel',tel:'+56935287199'},
  {nombre:'Kiven Henz',tel:'+56964880196'},
  {nombre:'Humberto Morales',tel:'+56994946414'},
  {nombre:'Giovanino Perugini',tel:'+56933592097'},
  {nombre:'Javier Honores',tel:'+56929161693'}
]

var fechaActual=new Date()
fechaActual.setHours(0,0,0,0)

// Detectar tipo de usuario
var coordAuth = sessionStorage.getItem('coord_auth')
var tecnicoNombre = sessionStorage.getItem('tecnico_nombre')
var isCoord = !!coordAuth
var isTecnico = !!tecnicoNombre && !isCoord

console.log('[AGENDA] Usuario:', isCoord ? 'Coordinador' : (isTecnico ? 'Técnico: '+tecnicoNombre : 'Sin sesión'))

// ==========================================
// HELPERS
// ==========================================
function toast(msg,tipo){
  var t=document.getElementById('toast')
  t.textContent=msg
  t.className='toast '+(tipo||'')
  t.classList.add('show')
  setTimeout(function(){t.classList.remove('show')},3500)
}

function diag(msg,tipo){
  var d=document.getElementById('diag')
  d.textContent=msg
  d.className='diag show '+(tipo||'')
}

function fmtFecha(d){
  return d.toISOString().slice(0,10)
}

function pintarFecha(){
  var f=fechaActual
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado']
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']
  var hoy=new Date(); hoy.setHours(0,0,0,0)
  var esHoy=f.getTime()===hoy.getTime()
  var manana=new Date(hoy); manana.setDate(manana.getDate()+1)
  var esManana=f.getTime()===manana.getTime()
  
  var label=dias[f.getDay()]+' '+f.getDate()+' de '+meses[f.getMonth()]
  if(esHoy) label+=' <span class="fecha-hoy">HOY</span>'
  else if(esManana) label+=' <span class="fecha-hoy" style="background:var(--azul)">MAÑANA</span>'
  
  document.getElementById('fecha-dia').innerHTML=label
  document.getElementById('fecha-sub').textContent=f.getFullYear()+' · Santiago RM'
}

function cambiarDia(d){
  fechaActual.setDate(fechaActual.getDate()+d)
  pintarFecha()
  cargarEventos()
}

// ==========================================
// SUPABASE - sin librería para máxima compatibilidad
// ==========================================
async function sbInsert(tabla, datos){
  console.log('[SB] INSERT en', tabla, datos)
  try{
    var resp = await fetch(SB_URL+'/rest/v1/'+tabla, {
      method:'POST',
      headers:{
        'apikey': SB_KEY,
        'Authorization': 'Bearer '+SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(datos)
    })
    var text = await resp.text()
    console.log('[SB] Status:', resp.status, 'Body:', text)
    if(!resp.ok){
      return {ok:false, status:resp.status, error:text}
    }
    var data = JSON.parse(text)
    return {ok:true, status:resp.status, data:data}
  } catch(e) {
    console.error('[SB] Network error:', e)
    return {ok:false, error:'Error de conexión: '+(e.message||e), exception:true}
  }
}

async function sbSelect(tabla, query){
  try{
    var resp = await fetch(SB_URL+'/rest/v1/'+tabla+'?'+query, {
      headers:{
        'apikey': SB_KEY,
        'Authorization': 'Bearer '+SB_KEY
      }
    })
    if(!resp.ok) return {ok:false, error:await resp.text()}
    return {ok:true, data:await resp.json()}
  } catch(e) {
    return {ok:false, error:e.message}
  }
}

async function sbUpdate(tabla, query, datos){
  try{
    var resp = await fetch(SB_URL+'/rest/v1/'+tabla+'?'+query, {
      method:'PATCH',
      headers:{
        'apikey': SB_KEY,
        'Authorization': 'Bearer '+SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(datos)
    })
    if(!resp.ok) return {ok:false, error:await resp.text()}
    return {ok:true, data:await resp.json()}
  } catch(e) {
    return {ok:false, error:e.message}
  }
}

// ==========================================
// CARGAR EVENTOS
// ==========================================
var eventos=[]

async function cargarEventos(){
  var cont=document.getElementById('eventos')
  cont.innerHTML='<div class="empty"><div class="empty-ico">⏳</div><div class="empty-titulo">Cargando...</div></div>'
  
  var fecha=fmtFecha(fechaActual)
  
  // Si es técnico, filtrar por su nombre. Si es coordinador, mostrar todos
  var query='fecha=eq.'+fecha+'&order=hora.asc'
  if(isTecnico){
    query='fecha=eq.'+fecha+'&tecnico=ilike.*'+encodeURIComponent(tecnicoNombre)+'*&order=hora.asc'
  }
  
  var r=await sbSelect('agenda',query)
  
  if(!r.ok){
    cont.innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-titulo">Error cargando</div><div>'+(r.error||'')+'</div></div>'
    return
  }
  
  eventos=r.data||[]
  document.getElementById('num-eventos').textContent=eventos.length
  
  if(eventos.length===0){
    var msgVacio = isTecnico 
      ? '<div class="empty-titulo">Sin servicios asignados</div><div>No tienes citas para este día</div>'
      : '<div class="empty-titulo">Sin agendamientos</div><div>Toca <b>+ Nuevo</b> para agregar uno</div>'
    cont.innerHTML='<div class="empty"><div class="empty-ico">📅</div>'+msgVacio+'</div>'
    return
  }
  
  cont.innerHTML=eventos.map(function(e){
    var hora=(e.hora||'').slice(0,5)
    var iconos={'agendado':'📋','confirmado':'✅','en-ruta':'🚗','completado':'🏁','cancelado':'❌'}
    var tecCorto = isTecnico ? '✓ ASIGNADO' : (e.tecnico||'').split(' ')[0].toUpperCase()
    return '<div class="evento" onclick="verDetalle(\''+e.id+'\')">'+
      '<div class="hora">'+hora+'<div class="hora-est">'+tecCorto+'</div></div>'+
      '<div class="evento-body">'+
        '<div class="evento-cliente">'+(e.cliente||'Sin cliente')+'</div>'+
        '<div class="evento-meta"><span class="evento-tag tag-'+(e.estado||'agendado')+'">'+(e.estado||'agendado')+'</span>'+(e.servicio||'-')+(e.direccion?' · '+e.direccion:'')+'</div>'+
      '</div>'+
      '<div class="estado-icon">'+(iconos[e.estado]||'📋')+'</div>'+
    '</div>'
  }).join('')
}

// ==========================================
// MODAL NUEVO
// ==========================================
function abrirNuevo(){
  document.getElementById('f-fecha').value=fmtFecha(fechaActual)
  document.getElementById('f-hora').value='09:00'
  document.getElementById('f-cliente').value=''
  document.getElementById('f-tel').value=''
  document.getElementById('f-vehiculo').value=''
  document.getElementById('f-servicio').value=''
  document.getElementById('f-direccion').value=''
  document.getElementById('f-notas').value=''
  document.getElementById('diag').className='diag'
  
  // Pintar técnicos
  var grid=document.getElementById('tec-grid')
  grid.innerHTML=TECNICOS.map(function(t,i){
    return '<label class="tec-chip" onclick="this.classList.toggle(\'selected\')">'+
      '<input type="checkbox" class="t-chk" value="'+t.nombre+'">'+
      '<div class="tec-chip-dot"></div>'+
      '<div class="tec-chip-nombre">'+t.nombre.split(' ')[0]+'</div>'+
    '</label>'
  }).join('')
  
  document.getElementById('modal').classList.add('open')
}

function cerrarModal(){
  document.getElementById('modal').classList.remove('open')
}

// ==========================================
// GUARDAR (la función clave)
// ==========================================
async function guardar(){
  var btn=document.getElementById('btn-g')
  var textoOriginal=btn.textContent
  
  // Recoger datos
  var fecha=document.getElementById('f-fecha').value
  var hora=document.getElementById('f-hora').value
  var cliente=document.getElementById('f-cliente').value.trim()
  var tel=document.getElementById('f-tel').value.trim()
  var vehiculo=document.getElementById('f-vehiculo').value.trim()
  var servicio=document.getElementById('f-servicio').value.trim()
  var direccion=document.getElementById('f-direccion').value.trim()
  var notas=document.getElementById('f-notas').value.trim()
  
  var checkboxesSeleccionados=Array.from(document.querySelectorAll('.tec-chip.selected .t-chk'))
  var tecnicosSeleccionados=checkboxesSeleccionados.map(function(c){return c.value})
  
  // Validar
  if(!fecha){toast('⚠️ Falta la fecha','err');return}
  if(!hora){toast('⚠️ Falta la hora','err');return}
  if(!cliente){toast('⚠️ Falta el cliente','err');return}
  if(tecnicosSeleccionados.length===0){toast('⚠️ Selecciona al menos 1 técnico','err');return}
  
  // Bloquear botón
  btn.disabled=true
  btn.textContent='Guardando...'
  diag('Conectando a Supabase...','')
  
  // Preparar datos
  var datos={
    fecha:fecha,
    hora:hora+':00',
    tecnico:tecnicosSeleccionados.join(', '),
    cliente:cliente,
    telefono:tel||null,
    vehiculo:vehiculo||null,
    servicio:servicio||null,
    direccion:direccion||null,
    notas:notas||null,
    estado:'agendado'
  }
  
  console.log('[GUARDAR] Iniciando con datos:',datos)
  
  // GUARDAR
  var r=await sbInsert('agenda',datos)
  
  console.log('[GUARDAR] Resultado:',r)
  
  if(!r.ok){
    console.error('[GUARDAR] FALLO:',r)
    diag('❌ ERROR: '+(r.error||'sin detalle'),'error')
    btn.disabled=false
    btn.textContent=textoOriginal
    
    var msg='No se pudo guardar.\n\n'
    if(r.exception) msg+='Posible problema de conexión a internet.\n'
    if(r.status) msg+='Código HTTP: '+r.status+'\n'
    msg+='\nDetalle: '+(r.error||'sin detalle')+'\n\n'
    msg+='✋ NO se enviarán los WhatsApp porque la cita no se guardó.'
    alert(msg)
    return
  }
  
  // CONFIRMAR que data tiene contenido
  if(!r.data || r.data.length===0){
    diag('❌ La BD respondió OK pero sin confirmación','error')
    btn.disabled=false
    btn.textContent=textoOriginal
    alert('Algo raro: el servidor respondió OK pero no devolvió el registro. Por favor recarga la página y revisa si quedó guardado.')
    return
  }
  
  console.log('[GUARDAR] ✅ Guardado OK con id:',r.data[0].id)
  diag('✅ Guardado con id '+r.data[0].id.slice(0,8)+'...','ok')
  
  // Generar links WhatsApp para cada técnico
  var linksWhatsApp=[]
  if(isCoord){
    tecnicosSeleccionados.forEach(function(nombre){
      var tec=TECNICOS.find(function(t){return t.nombre===nombre})
      if(tec){
        var msg='🔧 NUEVO SERVICIO\n\n'+
                'Hola '+nombre.split(' ')[0]+'!\n\n'+
                '📅 '+fecha+' a las '+hora+'\n'+
                '👤 '+cliente+(tel?' ('+tel+')':'')+'\n'+
                (servicio?'🔧 '+servicio+'\n':'')+
                (direccion?'📍 '+direccion+'\n':'')+
                (vehiculo?'🚗 '+vehiculo+'\n':'')+
                '\nConfirma recepción.\nServiruta +56 9 8505 8250'
        var url='https://wa.me/'+tec.tel.replace(/\D/g,'')+'?text='+encodeURIComponent(msg)
        linksWhatsApp.push({tecnico:nombre, url:url})
      }
    })
  }
  
  // Cerrar modal
  cerrarModal()
  
  // Mostrar mensaje + abrir WhatsApp en background con confirmación
  toast('✅ Guardado correctamente','ok')
  await cargarEventos()
  
  // Enviar WhatsApp uno por uno con confirmación
  if(linksWhatsApp.length>0){
    setTimeout(function(){
      if(confirm('✅ Cita guardada.\n\n¿Quieres abrir WhatsApp para notificar a '+linksWhatsApp.length+' técnico(s)?')){
        linksWhatsApp.forEach(function(item){
          window.open(item.url,'_blank')
        })
      }
    },500)
  }
}

// ==========================================
// VER DETALLE Y CAMBIAR ESTADO
// ==========================================
function verDetalle(id){
  var ev=eventos.find(function(e){return e.id===id})
  if(!ev) return
  
  var menu='👤 Cliente: '+ev.cliente+'\n'+
           '⏰ Hora: '+(ev.hora||'').slice(0,5)+'\n'+
           '👷 Técnico: '+ev.tecnico+'\n'+
           '📞 Tel: '+(ev.telefono||'-')+'\n'+
           '🔧 Servicio: '+(ev.servicio||'-')+'\n'+
           '📍 Dirección: '+(ev.direccion||'-')+'\n'+
           '🚗 Vehículo: '+(ev.vehiculo||'-')+'\n'+
           '📊 Estado: '+ev.estado+'\n'+
           (ev.notas?'📝 Notas: '+ev.notas+'\n':'')+'\n'+
           '¿Qué acción tomar?\n'+
           '1 - ✅ Confirmar\n'+
           '2 - 🚗 En ruta\n'+
           '3 - 🏁 Completar\n'+
           '4 - ❌ Cancelar\n'+
           '5 - 🗑️ Eliminar\n'+
           '6 - 💬 WhatsApp técnico\n'+
           '7 - 💬 WhatsApp cliente\n'+
           '0 - Cancelar'
  
  var opcion=prompt(menu)
  if(!opcion||opcion==='0') return
  
  if(opcion==='1') cambiarEstado(id,'confirmado')
  else if(opcion==='2') cambiarEstado(id,'en-ruta')
  else if(opcion==='3') cambiarEstado(id,'completado')
  else if(opcion==='4') cambiarEstado(id,'cancelado')
  else if(opcion==='5') eliminar(id)
  else if(opcion==='6') waTecnico(ev)
  else if(opcion==='7') waCliente(ev)
}

async function cambiarEstado(id,nuevoEstado){
  var r=await sbUpdate('agenda','id=eq.'+id,{estado:nuevoEstado})
  if(r.ok){
    toast('✅ Estado cambiado a '+nuevoEstado,'ok')
    cargarEventos()
  } else {
    toast('❌ Error: '+r.error,'err')
  }
}

async function eliminar(id){
  if(!confirm('¿Eliminar este agendamiento? Esta acción es irreversible.')) return
  try{
    var resp = await fetch(SB_URL+'/rest/v1/agenda?id=eq.'+id, {
      method:'DELETE',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    })
    if(resp.ok){toast('🗑️ Eliminado','ok');cargarEventos()}
    else toast('❌ Error eliminando','err')
  } catch(e) {
    toast('❌ '+e.message,'err')
  }
}

function waTecnico(ev){
  var tec=TECNICOS.find(function(t){return ev.tecnico.indexOf(t.nombre)>=0})
  if(!tec){toast('No tengo el tel del técnico','err');return}
  var msg='Hola '+tec.nombre.split(' ')[0]+'! Te recuerdo el servicio:\n\n'+
          (ev.hora||'').slice(0,5)+' · '+ev.cliente+'\n'+
          (ev.servicio?ev.servicio+'\n':'')+
          (ev.direccion||'')
  window.open('https://wa.me/'+tec.tel.replace(/\D/g,'')+'?text='+encodeURIComponent(msg),'_blank')
}

function waCliente(ev){
  if(!ev.telefono){toast('Sin teléfono','err');return}
  var msg='Hola '+(ev.cliente||'').split(' ')[0]+'! Te recuerdo tu servicio Serviruta para hoy a las '+(ev.hora||'').slice(0,5)+'.\n\n'+
          (ev.servicio?'Servicio: '+ev.servicio:'')+'\n\nNos vemos pronto!'
  window.open('https://wa.me/'+ev.telefono.replace(/\D/g,'')+'?text='+encodeURIComponent(msg),'_blank')
}

  document.getElementById('cuenta-sub').textContent='(modo demo)'

pintarFecha()
