<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviruta В· Coordinador В· Presupuestos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--rojo:#E8210A;--rojo-d:#B01A08;--rojo-g:rgba(232,33,10,0.08);--negro:#080808;--c1:#0F0F12;--c2:#161619;--c3:#1E1E22;--borde:#2C2C32;--txt:#F0EDE6;--txt2:#9996A0;--txt3:#55525E;--verde:#22C55E;--amarillo:#F5C518;--naranja:#FB923C;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--negro);color:var(--txt);font-family:"DM Sans",sans-serif;min-height:100vh;max-width:600px;margin:0 auto;}
.top{background:var(--c1);border-bottom:1px solid var(--borde);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-title{font-family:"Syne",sans-serif;font-weight:700;font-size:14px;}
.top-back{background:none;border:1px solid var(--borde);color:var(--txt3);font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.body{padding:16px;}
.filtros{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.filtro{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--borde);background:var(--c2);color:var(--txt3);white-space:nowrap;font-family:"DM Sans",sans-serif;transition:all 0.15s;}
.filtro.active{background:var(--rojo);border-color:var(--rojo);color:#fff;}
.card{background:var(--c2);border:1px solid var(--borde);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;}
.card:hover{border-color:var(--borde2,#3A3A42);}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.card-cliente{font-family:"Syne",sans-serif;font-weight:700;font-size:15px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;font-family:"Syne",sans-serif;}
.badge.nueva{background:var(--rojo-g);color:var(--rojo);border:1px solid rgba(232,33,10,0.3);}
.badge.valorizada{background:rgba(245,197,24,0.1);color:var(--amarillo);border:1px solid rgba(245,197,24,0.3);}
.badge.enviada{background:rgba(34,197,94,0.1);color:var(--verde);border:1px solid rgba(34,197,94,0.3);}
.card-info{font-size:12px;color:var(--txt3);}
.loading{text-align:center;padding:40px;color:var(--txt3);font-size:13px;}
.empty{text-align:center;padding:40px;color:var(--txt3);}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* DETALLE */
.detalle{display:none;}
.detalle.open{display:block;}
.det-cliente{font-family:"Syne",sans-serif;font-weight:800;font-size:20px;margin-bottom:4px;}
.det-info{font-size:13px;color:var(--txt3);margin-bottom:16px;}
.sec{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin:14px 0 8px;display:flex;align-items:center;gap:8px;}
.sec::after{content:"";flex:1;height:1px;background:var(--borde);}
.item-row{display:flex;gap:10px;align-items:center;background:var(--c2);border:1px solid var(--borde);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.item-num{font-size:12px;color:var(--txt3);min-width:20px;}
.item-desc{flex:1;font-size:13px;}
.item-precio{background:var(--c3);border:1px solid var(--borde);border-radius:6px;color:var(--txt);font-family:"DM Sans",sans-serif;font-size:14px;padding:8px 10px;outline:none;width:110px;text-align:right;}
.item-precio:focus{border-color:var(--rojo);}
.total-box{background:var(--c2);border:1px solid var(--borde);border-radius:8px;padding:14px;margin-bottom:14px;}
.total-row{display:flex;justify-content:space-between;font-size:13px;color:var(--txt2);padding:3px 0;}
.total-final{display:flex;justify-content:space-between;border-top:1px solid var(--borde);padding-top:10px;margin-top:6px;}
.total-label{font-family:"Syne",sans-serif;font-weight:700;font-size:15px;}
.total-val{font-family:"Syne",sans-serif;font-weight:800;font-size:28px;color:var(--verde);}
.inp{width:100%;background:var(--c2);border:1px solid var(--borde);border-radius:8px;color:var(--txt);font-family:"DM Sans",sans-serif;font-size:14px;padding:10px 12px;outline:none;margin-bottom:10px;}
.inp:focus{border-color:var(--rojo);}
.btn{width:100%;padding:13px;border-radius:10px;font-family:"Syne",sans-serif;font-weight:700;font-size:14px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:all 0.15s;}
.btn-rojo{background:var(--rojo);color:#fff;}
.btn-verde{background:var(--verde);color:#000;}
.btn-wa{background:#25D366;color:#fff;}
.btn-sec{background:var(--c2);border:1px solid var(--borde);color:var(--txt2);}
.iva-row{display:flex;align-items:center;justify-content:space-between;background:var(--c2);border:1px solid var(--borde);border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.iva-lbl{font-size:13px;}
.iva-sub{font-size:11px;color:var(--txt3);margin-top:1px;}
</style>
</head>
<body>

<div class="top">
  <button class="top-back" onclick="location.href='login-coordinador.html'">вҶҗ Volver</button>
  <div class="top-title">рҹ“Ӣ Presupuestos</div>
  <button onclick="loadPptos()" style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;">вҶ»</button>
</div>

<!-- LISTA -->
<div id="lista-view" class="body">
  <button onclick="nuevoPpto()" style="width:100%;background:var(--rojo);border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:13px;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;">пјӢ Crear presupuesto directo</button>
<div class="filtros">
    <div class="filtro active" onclick="filtrar('todas',this)">Todas</div>
    <div class="filtro" onclick="filtrar('nueva',this)">рҹ”ҙ Nuevas</div>
    <div class="filtro" onclick="filtrar('valorizada',this)">рҹҹЎ Valorizadas</div>
    <div class="filtro" onclick="filtrar('enviada',this)">рҹҹў Enviadas</div>
  </div>
  <div id="pptos-list"><div class="loading">вҸі Cargando presupuestos...</div></div>
</div>

<!-- DETALLE -->
<div id="detalle-view" style="display:none;padding:16px 16px 80px;">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <button onclick="volverLista()" style="background:none;border:1px solid var(--borde);color:var(--txt3);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;">вҶҗ Volver</button>
    <span id="det-badge" class="badge nueva">Nueva</span>
  </div>
  <div id="det-cliente" class="det-cliente">вҖ”</div>
  <div id="det-info" class="det-info">вҖ”</div>

  <div class="sec">Trabajos a valorizar</div>
  <div id="det-items"></div>

  <div class="iva-row">
    <div><div class="iva-lbl">Incluir IVA (19%)</div><div class="iva-sub">Aplica sobre el valor neto</div></div>
    <input type="checkbox" id="aplica-iva" checked onchange="calcTotal()" style="width:18px;height:18px;cursor:pointer;accent-color:var(--rojo)">
  </div>

  <div class="total-box" id="total-box">
    <div class="total-final"><span class="total-label">Total</span><span class="total-val" id="total-val">$0</span></div>
  </div>

  <div class="sec">Agregar Гӯtems adicionales (coordinador)</div>
  <div id="coord-items-wrap"></div>
  <button onclick="coordAgregarItem()" style="width:100%;background:var(--c3);border:1px solid var(--borde);border-radius:8px;color:var(--txt2);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:10px;cursor:pointer;margin-bottom:12px;">пјӢ Agregar Гӯtem desde coordinador</button>

  <div class="sec">Notas al cliente</div>
  <textarea class="inp" id="det-notas" placeholder="Notas opcionales..." rows="2"></textarea>

  <button class="btn btn-rojo" onclick="guardarValorizacion()">рҹ’ҫ Guardar valorizaciГіn</button>
  <button class="btn btn-wa" onclick="enviarWA()">рҹ’¬ Enviar al cliente por WhatsApp</button>
  <button class="btn" onclick="pasarContabilidad()" style="width:100%;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.4);color:#A78BFA;border-radius:8px;padding:13px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px;">рҹ“Ҡ Pasar a contabilidad sin enviar al cliente</button>
  <button class="btn btn-sec" onclick="volverLista()">Cancelar</button>
</div>


<!-- MODAL NUEVO PPTO DIRECTO -->
<div id="modal-nuevo-ppto" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:flex-end;justify-content:center;" onclick="if(event.target===this)document.getElementById('modal-nuevo-ppto').style.display='none'">
  <div style="background:var(--c2);border:1px solid var(--borde);border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px 20px 36px;max-height:90vh;overflow-y:auto;">
    <div style="width:36px;height:4px;background:var(--borde);border-radius:2px;margin:0 auto 16px;"></div>
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:16px;">Nuevo presupuesto directo</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <label style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block;">Cliente</label>
        <input class="inp" id="np-cliente" placeholder="Nombre del cliente">
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block;">TelГ©fono</label>
        <input class="inp" id="np-tel" placeholder="+56 9 XXXX XXXX" type="tel">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <label style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block;">VehГӯculo</label>
        <input class="inp" id="np-vehiculo" placeholder="Ej: Hyundai Tucson">
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block;">Patente</label>
        <input class="inp" id="np-patente" placeholder="Ej: ABCD-12" style="text-transform:uppercase;margin-bottom:10px;" oninput="this.value=this.value.toUpperCase()">
        <label style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block;">TГ©cnico</label>
        <select class="inp" id="np-tecnico" style="padding:10px 12px;">
          <option value="Jorge Ramirez">Jorge Ramirez</option>
          <option value="Felipe Mora">Felipe Mora</option>
          <option value="Carlos Vega">Carlos Vega</option>
          <option value="Reynaldo Aguas Bertel">Reynaldo Aguas Bertel</option>
          <option value="Kiven Henz">Kiven Henz</option>
          <option value="Humberto Morales">Humberto Morales</option>
          <option value="Giovanino Perugini">Giovanino Perugini</option>
          <option value="Reynaldo Aguas">Reynaldo Aguas</option>
        </select>
      </div>
    </div>

    <label style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block;margin-top:4px;">Trabajos a realizar</label>
    <div id="np-items-wrap"></div>
    <button onclick="npAgregarItem()" style="width:100%;background:var(--c3);border:1px solid var(--borde);border-radius:8px;color:var(--txt2);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:10px;cursor:pointer;margin-bottom:12px;">пјӢ Agregar trabajo</button>

    <label style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block;">CГіdigo aliado (opcional)</label>
    <input class="inp" id="np-aliado" placeholder="Ej: GRU-PEDRO01" style="font-family:monospace;font-size:13px;text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()">

    <button onclick="document.getElementById('modal-nuevo-ppto').style.display='none'" style="width:100%;background:var(--c3);border:1px solid var(--borde);border-radius:8px;color:var(--txt2);font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:13px;cursor:pointer;margin-bottom:8px;">Cancelar</button>
    <button onclick="guardarNuevoPpto()" style="width:100%;background:var(--rojo);border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:13px;cursor:pointer;">Guardar presupuesto</button>
  </div>
</div>
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--c3);border:1px solid var(--borde);border-radius:8px;padding:11px 18px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;"></div>

<script>
const SB_URL = 'https://bqlgfmqcefledqyodkii.supabase.co'
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxbGdmbXFjZWZsZWRxeW9ka2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTAxMjUsImV4cCI6MjA5NTE2NjEyNX0.m_XyXsZ84niHcHrKNgHSDSS8DxpR7vnHhMfQJk7yM_s'
let db = null
let pptos = []
let pptoActual = null
let filtroActual = 'todas'

function getDB() {
  if (!db) db = supabase.createClient(SB_URL, SB_KEY)
  return db
}

async function loadPptos() {
  document.getElementById('pptos-list').innerHTML = '<div class="loading">вҸі Cargando...</div>'
  try {
    const { data, error } = await getDB().from('presupuestos').select('*').order('created_at', {ascending: false})
    if (error) throw error
    pptos = data || []
    renderLista()
  } catch(e) {
    document.getElementById('pptos-list').innerHTML = '<div class="loading">вқҢ Error: ' + e.message + '</div>'
  }
}

function renderLista() {
  const lista = filtroActual === 'todas' ? pptos : pptos.filter(p => p.estado === filtroActual)
  const el = document.getElementById('pptos-list')
  if (lista.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">рҹ“Ӣ</div><p>Sin presupuestos ' + (filtroActual === 'todas' ? 'aГәn' : 'en este estado') + '</p></div>'
    return
  }
  const badges = {nueva:'рҹ”ҙ Nueva', valorizada:'рҹҹЎ Valorizada', enviada:'рҹҹў Enviada', aceptada:'вң… Aceptada'}
  el.innerHTML = lista.map(p => `
    <div class="card" onclick="abrirDetalle('${p.id}')">
      <div class="card-top">
        <div class="card-cliente">${p.cliente}</div>
        <span class="badge ${p.estado}">${badges[p.estado]||p.estado}</span>
      </div>
      <div class="card-info">рҹҡ— ${p.vehiculo||''}${p.auto?' В· '+p.auto:''} В· рҹ‘· ${p.tecnico} В· NВ° ${p.numero}</div>
      <div class="card-info" style="margin-top:4px">${(p.items||[]).slice(0,3).map(i=>'вҖў '+i.desc).join(' В· ')}${(p.items||[]).length>3?' +mГЎs':''}</div>
    </div>`).join('')
}

function filtrar(f, el) {
  filtroActual = f
  document.querySelectorAll('.filtro').forEach(x=>x.classList.remove('active'))
  el.classList.add('active')
  renderLista()
}

function abrirDetalle(id) {
  pptoActual = pptos.find(p=>p.id===id)
  if (!pptoActual) return
  document.getElementById('lista-view').style.display = 'none'
  document.getElementById('detalle-view').style.display = 'block'
  document.getElementById('det-cliente').textContent = pptoActual.cliente
  document.getElementById('det-info').textContent = 'рҹ“һ ' + (pptoActual.telefono||'Sin tel') + ' В· рҹҡ— ' + (pptoActual.vehiculo||'') + (pptoActual.auto?' В· '+pptoActual.auto:'') + ' В· рҹ‘· ' + pptoActual.tecnico
  document.getElementById('det-badge').textContent = pptoActual.estado
  document.getElementById('det-badge').className = 'badge ' + pptoActual.estado
  document.getElementById('det-notas').value = pptoActual.notas || ''
  // Limpiar Гӯtems coordinador previos
  coordItemId = 0; coordItems = []
  document.getElementById('coord-items-wrap').innerHTML = ''
  // Si ya tenГӯa Гӯtems del coordinador, mostrarlos
  if (pptoActual.items_coord && pptoActual.items_coord.length) {
    pptoActual.items_coord.forEach(function(item) {
      coordAgregarItem()
      var lastId = coordItemId
      document.getElementById('coord-desc-'+lastId).value = item.desc||''
      document.getElementById('coord-precio-'+lastId).value = item.precio_venta||''
    })
  }
  renderItems()
  calcTotal()
}

function renderItems() {
  const items = pptoActual.items || []
  document.getElementById('det-items').innerHTML = items.map((item,i) => `
    <div class="item-row" style="flex-wrap:wrap;gap:6px">
      <span class="item-num">${i+1}</span>
      <div class="item-desc" style="flex:1;min-width:100px">${item.desc}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <button onclick="cambiarCant(${item.id||i},-1)" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--borde);background:var(--c3);color:var(--txt);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">вҲ’</button>
        <span id="cant-${item.id||i}" style="font-family:'Syne',sans-serif;font-weight:800;font-size:14px;min-width:20px;text-align:center">${item.cant||1}</span>
        <button onclick="cambiarCant(${item.id||i},1)" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--borde);background:var(--c3);color:var(--txt);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">+</button>
      </div>
      <input class="item-precio" type="number" placeholder="Precio unit." value="${item.precio_venta||''}"
        oninput="setItemPrecio(${item.id||i}, this.value)" onchange="calcTotal()" style="width:110px">
    </div>`).join('')
}

function cambiarCant(id, delta) {
  const items = pptoActual.items || []
  const item = items.find(x=>(x.id||items.indexOf(x))===id) || items[id] || items.find((_,i)=>i===id)
  if (!item) return
  item.cant = Math.max(1, (item.cant||1) + delta)
  const el = document.getElementById('cant-'+id)
  if (el) el.textContent = item.cant
  calcTotal()
}

function setItemPrecio(id, val) {
  const items = pptoActual.items || []
  const item = items.find(x=>(x.id||items.indexOf(x))===id) || items[id]
  if (item) item.precio_venta = parseFloat(val)||0
  calcTotal()
}

function calcTotal() {
  const items = pptoActual?.items || []
  const coordExtra = getCoordItems()
  const sub = [...items, ...coordExtra].reduce((s,i)=>s+((i.precio_venta||0)*(i.cant||1)),0)
  const iva = document.getElementById('aplica-iva')?.checked ? Math.round(sub*0.19) : 0
  const total = sub + iva
  const box = document.getElementById('total-box')
  box.innerHTML = `
    <div class="total-row"><span>Subtotal</span><span>$${sub.toLocaleString('es-CL')}</span></div>
    ${iva>0?'<div class="total-row"><span>IVA (19%)</span><span>+$'+iva.toLocaleString('es-CL')+'</span></div>':''}
    <div class="total-final"><span class="total-label">TOTAL</span><span class="total-val">$${total.toLocaleString('es-CL')}</span></div>`
  return {sub, iva, total}
}

async function pasarContabilidad() {
  if (!pptoActual) return
  const {sub, iva, total} = calcTotal()
  const notas = document.getElementById('det-notas')?.value?.trim() || ''
  try {
    await getDB().from('presupuestos').update({
      items: pptoActual.items,
      items_coord: getCoordItems(),
      estado: 'valorizada',
      estado_servicio: 'completado',
      notas,
      subtotal: sub,
      iva,
      total
    }).eq('id', pptoActual.id)
    showToast('вң… Pasado a contabilidad correctamente')
    setTimeout(function(){ volverLista() }, 1500)
  } catch(e) {
    showToast('Error: ' + e.message)
  }
}

async function guardarValorizacion() {
  if (!pptoActual) return
  const {sub, iva, total} = calcTotal()
  const notas = document.getElementById('det-notas').value.trim()
  try {
    await getDB().from('presupuestos').update({
      items: pptoActual.items,
      items_coord: getCoordItems(),
      estado: 'valorizada',
      notas,
      subtotal: sub,
      iva,
      total
    }).eq('id', pptoActual.id)
    pptoActual.estado = 'valorizada'
    showToast('вң… ValorizaciГіn guardada')
    await loadPptos()
    volverLista()
  } catch(e) {
    showToast('вқҢ Error: ' + e.message)
  }
}

async function enviarWA() {
  if (!pptoActual) return
  const {sub, iva, total} = calcTotal()
  const notas = document.getElementById('det-notas').value.trim()
  const tel = (pptoActual.telefono||'').replace(/\D/g,'')
  let msg = `*PRESUPUESTO SERVIRUTA NВ° ${pptoActual.numero}*\n`
  msg += `_Taller MecГЎnico a Domicilio В· Santiago RM_\n`
  msg += `в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\n`
  msg += `рҹ‘Ө *${pptoActual.cliente}*\n`
  msg += `рҹҡ— ${pptoActual.vehiculo||''}${pptoActual.auto?' В· '+pptoActual.auto:''}\n\n`
  msg += `*SERVICIOS:*\n`
  ;[...(pptoActual.items||[]),...getCoordItems()].forEach((item,i)=>{
    const st = (item.precio_venta||0)*(item.cant||1)
    if (st > 0) msg += `${i+1}. ${item.desc}${item.cant>1?' Г—'+item.cant:''}: *$${st.toLocaleString('es-CL')}*\n`
  })
  msg += `\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n`
  if (iva > 0) msg += `Subtotal: $${sub.toLocaleString('es-CL')}\nIVA (19%): +$${iva.toLocaleString('es-CL')}\n`
  msg += `рҹ’° *TOTAL: $${total.toLocaleString('es-CL')}*\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n`
  if (notas) msg += `\nрҹ“Ӣ ${notas}\n`
  msg += `\nвҸ° VГЎlido 48 hrs В· +56 9 8505 8250`
  window.open(`https://wa.me/56${tel}?text=${encodeURIComponent(msg)}`, '_blank')
  await getDB().from('presupuestos').update({estado:'enviada'}).eq('id', pptoActual.id)
  pptoActual.estado = 'enviada'
  showToast('вң… WhatsApp abierto')
}

function volverLista() {
  document.getElementById('lista-view').style.display = 'block'
  document.getElementById('detalle-view').style.display = 'none'
  pptoActual = null
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)'
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)' }, 2500)
}

var npItems = []

}

function npAgregarItem() {
  npItemId++
  var id = npItemId
  var wrap = document.getElementById('np-items-wrap')
  var div = document.createElement('div')
  div.id = 'np-item-' + id
  div.style.display = 'flex'
  div.style.gap = '8px'

  inp1.id = 'np-desc-' + id

  inp2.className = 'inp'

async function guardarNuevoPpto() {
  var cliente = document.getElementById('np-cliente').value.trim()
  var tel = document.getElementById('np-tel').value.trim()
  if (!cliente || !tel) { showToast('Completa nombre y telГ©fono'); return }
  
  var items = []
  document.querySelectorAll('[id^="np-desc-"]').forEach(function(el) {
    var itemId = el.id.replace('np-desc-', '')
    var desc = el.value.trim()
    var precio = parseFloat(document.getElementById('np-precio-' + itemId)?.value) || 0
    if (desc) items.push({ id: parseInt(itemId), desc: desc, cant: 1, precio_venta: precio })
  })

  if (!items.length) { showToast('Agrega al menos un trabajo'); return }

  var num = Math.floor(Math.random() * 9000) + 1000
  var r = await getDB().from('presupuestos').insert({
    numero: num,
    tecnico: document.getElementById('np-tecnico').value,
    cliente: cliente,
    telefono: tel,
    vehiculo: document.getElementById('np-vehiculo').value.trim(),
    auto: document.getElementById('np-patente')?.value.trim() || '',
    items: items,
    estado: 'valorizada',
    aliado_codigo: document.getElementById('np-aliado').value.trim()
  })

  if (r.error) { showToast('Error: ' + r.error.message); return }
  showToast('Presupuesto creado')
  document.getElementById('modal-nuevo-ppto').style.display = 'none'
  loadPptos()
}


var coordItemId = 0

function getCoordItems() {
  var items = []
  document.querySelectorAll('[id^="coord-desc-"]').forEach(function(el) {
    var id = el.id.replace('coord-desc-', '')
    var desc = el.value.trim()
    var precioEl = document.getElementById('coord-precio-' + id)
    var precio = precioEl ? (parseFloat(precioEl.value) || 0) : 0
    if (desc) items.push({ id: parseInt(id), desc: desc, cant: 1, precio_venta: precio })
  })
  return items
}

function coordAgregarItem() {
  coordItemId++
  var id = coordItemId
  var wrap = document.getElementById('coord-items-wrap')
  if (!wrap) return
  var div = document.createElement('div')
  div.id = 'coord-item-' + id
  div.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;align-items:center'
  var inp1 = document.createElement('input')

  inp1.placeholder = 'Descripcion del item...'
  inp1.id = 'coord-desc-' + id
  inp1.style.flex = '1'
  inp1.style.marginBottom = '0'
  inp1.addEventListener('input', calcTotal)
  var inp2 = document.createElement('input')
  inp2.className = 'inp'
  inp2.type = 'number'
  inp2.placeholder = 'Precio unit.'
  inp2.id = 'coord-precio-' + id
  inp2.style.width = '110px'
  inp2.style.marginBottom = '0'
  inp2.style.textAlign = 'right'
  inp2.addEventListener('input', calcTotal)
  var btn = document.createElement('button')
  btn.textContent = 'X'
  btn.style.cssText = 'background:rgba(232,33,10,0.1);border:1px solid rgba(232,33,10,0.3);color:#E8210A;border-radius:6px;padding:8px 12px;cursor:pointer;flex-shrink:0'
  btn.onclick = function() { div.remove(); calcTotal() }
  div.appendChild(inp1)
  div.appendChild(inp2)
  div.appendChild(btn)
  wrap.appendChild(div)
}
