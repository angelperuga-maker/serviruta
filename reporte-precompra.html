<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Inspección Pre-Compra · Serviruta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0D;--s1:#111114;--s2:#16161B;--s3:#1C1C23;--line:#26262E;--rojo:#E8210A;--rojo-l:#FF4D2E;--verde:#22C55E;--amarillo:#F5C518;--naranja:#FB923C;--azul:#60A5FA;--morado:#A78BFA;--dorado:#D4AF37;--t1:#F6F4EF;--t2:#C7C5BF;--t3:#8B8990;--t4:#56555C;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t2);font-family:var(--body);font-size:14px;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:0 20px}
a{color:var(--rojo-l);text-decoration:none}

.bar{background:var(--s1);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;backdrop-filter:blur(16px)}
.sigil{width:36px;height:36px;background:var(--rojo);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:16px;color:#fff}
.logo{font-family:var(--display);font-weight:800;font-size:16px;color:var(--t1);flex:1}
.print-btn{background:var(--s3);border:1px solid var(--line);color:var(--t2);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer}

.hero{padding:40px 0 30px;text-align:center;background:radial-gradient(circle at 50% 0%,rgba(232,33,10,0.08),transparent 50%)}
.codigo{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px}
.hero h1{font-family:var(--display);font-weight:900;font-size:clamp(28px,5vw,44px);color:var(--t1);line-height:1.1;margin-bottom:8px;letter-spacing:-1px}
.hero .sub{font-size:15px;color:var(--t2);max-width:600px;margin:0 auto}

.card{background:var(--s1);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:16px}
.card-tit{font-family:var(--display);font-weight:800;font-size:16px;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-tit::before{content:"";width:4px;height:20px;background:var(--rojo);border-radius:2px}

/* Score visual */
.score-hero{background:linear-gradient(180deg,var(--s2),var(--s1));border:2px solid var(--line);border-radius:16px;padding:30px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.score-hero.excelente{border-color:var(--verde);background:linear-gradient(180deg,rgba(34,197,94,0.1),var(--s1))}
.score-hero.regular{border-color:var(--amarillo);background:linear-gradient(180deg,rgba(245,197,24,0.1),var(--s1))}
.score-hero.malo{border-color:var(--rojo);background:linear-gradient(180deg,rgba(232,33,10,0.1),var(--s1))}
.score-num{font-family:var(--display);font-weight:900;font-size:96px;line-height:1;letter-spacing:-3px}
.score-hero.excelente .score-num{color:var(--verde)}
.score-hero.regular .score-num{color:var(--amarillo)}
.score-hero.malo .score-num{color:var(--rojo)}
.score-lbl{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:0.15em;margin-top:5px;text-transform:uppercase}
.score-hero .rec{font-family:var(--display);font-weight:800;font-size:20px;color:var(--t1);margin-top:16px}
.score-hero .rec-desc{font-size:13px;color:var(--t2);margin-top:6px;max-width:500px;margin-left:auto;margin-right:auto}

/* Datos */
.datos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.dato{padding:12px;background:var(--s2);border-radius:8px}
.dato-lbl{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.dato-val{font-family:var(--display);font-weight:700;font-size:14px;color:var(--t1)}

/* Resumen barras */
.resumen-barra{display:grid;grid-template-columns:100px 1fr auto;gap:12px;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line)}
.resumen-barra:last-child{border:none}
.resumen-lbl{font-family:var(--display);font-weight:700;font-size:13px}
.resumen-lbl.ok{color:var(--verde)}
.resumen-lbl.warn{color:var(--amarillo)}
.resumen-lbl.err{color:var(--rojo-l)}
.resumen-lbl.na{color:var(--t3)}
.barra-viz{background:var(--s3);height:22px;border-radius:6px;overflow:hidden}
.barra-viz-fill{height:100%;border-radius:6px;transition:width 500ms}
.barra-viz-fill.ok{background:var(--verde)}
.barra-viz-fill.warn{background:var(--amarillo)}
.barra-viz-fill.err{background:var(--rojo)}
.barra-viz-fill.na{background:var(--t4)}
.resumen-num{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--t1)}

/* Valorización */
.valor-box{background:linear-gradient(135deg,rgba(232,33,10,0.12),rgba(251,146,60,0.05));border:1px solid rgba(232,33,10,0.3);border-radius:14px;padding:22px;text-align:center;margin-top:12px}
.valor-num{font-family:var(--display);font-weight:900;font-size:36px;color:var(--rojo-l);letter-spacing:-1px}
.valor-desc{font-size:13px;color:var(--t2);margin-top:6px}

/* Categorías */
.cat-box{background:var(--s2);border-radius:12px;overflow:hidden;margin-bottom:10px;border:1px solid var(--line)}
.cat-head{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.cat-head:hover{background:var(--s3)}
.cat-num{width:28px;height:28px;background:var(--rojo);color:#fff;border-radius:6px;font-family:var(--display);font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-nom{flex:1;font-family:var(--display);font-weight:700;font-size:14px;color:var(--t1)}
.cat-est{display:flex;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700}
.cat-est span{padding:3px 8px;border-radius:999px;letter-spacing:0.05em}
.cat-est .e-ok{background:rgba(34,197,94,0.15);color:var(--verde)}
.cat-est .e-warn{background:rgba(245,197,24,0.15);color:var(--amarillo)}
.cat-est .e-err{background:rgba(232,33,10,0.15);color:var(--rojo-l)}
.cat-arrow{color:var(--t3);transition:transform 200ms}
.cat-box.open .cat-arrow{transform:rotate(180deg)}
.cat-body{max-height:0;overflow:hidden;transition:max-height 500ms;background:var(--s1)}
.cat-box.open .cat-body{max-height:none;padding:12px 18px 18px}

.pto{padding:10px 0;border-bottom:1px dashed var(--line);display:grid;grid-template-columns:24px 1fr auto;gap:10px;align-items:center}
.pto:last-child{border:none}
.pto-icono{font-size:16px;display:flex;align-items:center;justify-content:center}
.pto-icono.ok{color:var(--verde)}
.pto-icono.warn{color:var(--amarillo)}
.pto-icono.err{color:var(--rojo-l)}
.pto-icono.na{color:var(--t3)}
.pto-nom{font-size:13px;color:var(--t1);line-height:1.3}
.pto-nom small{display:block;color:var(--t3);font-size:11px;margin-top:2px}
.pto-est{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:999px;letter-spacing:0.05em;font-weight:700}
.pto-est.ok{background:rgba(34,197,94,0.15);color:var(--verde)}
.pto-est.warn{background:rgba(245,197,24,0.15);color:var(--amarillo)}
.pto-est.err{background:rgba(232,33,10,0.15);color:var(--rojo-l)}
.pto-est.na{background:var(--s3);color:var(--t3)}
.pto-nota{grid-column:2/-1;background:var(--s2);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--t2);margin-top:6px;font-style:italic;border-left:2px solid var(--morado)}
.pto-fotos{grid-column:2/-1;display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pto-foto{width:80px;height:80px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid var(--line)}

/* CTA final */
.cta-final{background:linear-gradient(135deg,rgba(232,33,10,0.15),rgba(251,146,60,0.05));border:2px solid var(--rojo);border-radius:16px;padding:30px;text-align:center;margin:20px 0}
.cta-final h3{font-family:var(--display);font-weight:800;font-size:20px;color:var(--t1);margin-bottom:8px}
.cta-final p{color:var(--t2);margin-bottom:16px;max-width:500px;margin-left:auto;margin-right:auto}
.btn-wa{background:#25D366;color:#fff;padding:14px 24px;border-radius:10px;font-family:var(--display);font-weight:800;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:8px}

.foot{padding:30px 20px;text-align:center;font-size:11px;color:var(--t4);border-top:1px solid var(--line);margin-top:30px}
.foot .brand{font-family:var(--display);font-weight:800;font-size:14px;color:var(--t2);margin-bottom:6px}
.foot .brand span{color:var(--rojo)}

.loading{text-align:center;padding:60px 20px;color:var(--t3)}
.error{background:rgba(232,33,10,0.1);border:1px solid var(--rojo);border-radius:12px;padding:20px;color:var(--rojo-l);text-align:center}

@media print{
  body{background:#fff;color:#000}
  .bar,.print-btn,.cta-final{display:none}
  .card{background:#fff;border:1px solid #ccc;page-break-inside:avoid}
  .cat-body{max-height:none;padding:12px 18px 18px}
  .cat-box{page-break-inside:avoid}
}
</style>
</head>

// Buscar punto por id
function buscarPunto(id){
  for(var i=0;i<CATALOGO.length;i++){
    var p = CATALOGO[i].puntos.find(function(x){return x.id===id})
    if(p) return {punto:p, categoria:CATALOGO[i]}
  }
  return null
}

async function cargar(){
  var params = new URLSearchParams(window.location.search)
  var id = params.get('id')
  if(!id){
    document.getElementById('cont').innerHTML = '<div class="error">❌ ID de reporte no especificado en URL</div>'
    return
  }
  
  try{
    var resp = await fetch(SB_URL+'/rest/v1/inspecciones_precompra?id=eq.'+id, {
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    })
    if(!resp.ok) throw new Error('HTTP '+resp.status)
    var arr = await resp.json()
    if(!arr || !arr.length) throw new Error('Reporte no encontrado')
    render(arr[0])
  }catch(e){
    document.getElementById('cont').innerHTML = '<div class="error">❌ Error: '+e.message+'</div>'
  }
}

function render(insp){
  var checklist = insp.checklist || {}
  var fotos = insp.fotos || []
  
  // Agrupar fotos por punto
  var fotosPorPunto = {}
  fotos.forEach(function(f){
    if(!fotosPorPunto[f.punto_id]) fotosPorPunto[f.punto_id] = []
    fotosPorPunto[f.punto_id].push(f)
  })
  
  // Contar totales
  var ok=0, warn=0, err=0, na=0, total=0
  Object.keys(checklist).forEach(function(pid){
    total++
    var e = checklist[pid].estado
    if(e==='ok') ok++
    else if(e==='warn') warn++
    else if(e==='err') err++
    else if(e==='na') na++
  })
  
  var score = insp.score_general || 0
  var scoreClass = score >= 85 ? 'excelente' : (score >= 65 ? 'regular' : 'malo')
  var scoreLbl = score >= 85 ? 'EXCELENTE' : (score >= 65 ? 'PRECAUCIÓN' : 'ALTO RIESGO')
  var recTxt = {
    'comprar': {tit:'✅ Recomendación: COMPRAR', desc:'El vehículo se encuentra en excelente estado técnico. No se detectaron alertas críticas que impidan la compra.'},
    'comprar_con_negociacion': {tit:'⚠️ Recomendación: NEGOCIAR', desc:'Hay observaciones que requieren atención. Recomendamos negociar el precio considerando las reparaciones estimadas antes de cerrar la compra.'},
    'no_comprar': {tit:'❌ Recomendación: NO COMPRAR', desc:'Se detectaron fallas críticas que hacen esta compra de alto riesgo. La inversión en reparaciones sería significativa.'}
  }
  var rec = recTxt[insp.recomendacion] || {tit:'Sin recomendación', desc:''}
  
  var html = ''
  
  // HERO
  html += '<div class="hero">'
  html += '<div class="codigo">Reporte '+(insp.codigo||insp.id.slice(0,8))+' · Plan '+(insp.plan||'').toUpperCase()+'</div>'
  html += '<h1>'+(insp.marca||'Vehículo')+' '+(insp.modelo||'')+'</h1>'
  html += '<div class="sub">Inspección pre-compra realizada por Serviruta</div>'
  html += '</div>'
  
  // SCORE
  html += '<div class="score-hero '+scoreClass+'">'
  html += '<div class="score-num">'+score+'</div>'
  html += '<div class="score-lbl">SCORE 0-100 · '+scoreLbl+'</div>'
  html += '<div class="rec">'+rec.tit+'</div>'
  html += '<div class="rec-desc">'+rec.desc+'</div>'
  html += '</div>'
  
  // DATOS VEHÍCULO
  html += '<div class="card">'
  html += '<div class="card-tit">📋 Datos del vehículo</div>'
  html += '<div class="datos-grid">'
  var datos = [
    ['Tipo', insp.vehiculo_tipo],
    ['Marca', insp.marca],
    ['Modelo', insp.modelo],
    ['Año', insp.ano],
    ['Patente', insp.patente],
    ['KM', insp.km ? insp.km.toLocaleString('es-CL') : null],
    ['VIN', insp.vin],
    ['Ubicación', insp.ubicacion_revision],
    ['Fecha inspección', insp.fecha_completado ? new Date(insp.fecha_completado).toLocaleDateString('es-CL') : null],
    ['Técnico', insp.tecnico_asignado]
  ]
  datos.forEach(function(d){
    if(d[1]){
      html += '<div class="dato"><div class="dato-lbl">'+d[0]+'</div><div class="dato-val">'+d[1]+'</div></div>'
    }
  })
  html += '</div></div>'
  
  // RESUMEN
  html += '<div class="card">'
  html += '<div class="card-tit">📊 Resumen general</div>'
  html += renderBarra('ok', 'OK', ok, total)
  html += renderBarra('warn', 'Atención', warn, total)
  html += renderBarra('err', 'Urgente', err, total)
  if(na>0) html += renderBarra('na', 'N/A', na, total)
  html += '<div style="text-align:center;padding:12px 0;font-family:var(--display);font-weight:800;font-size:14px;color:var(--t2)">Total: '+total+' puntos revisados</div>'
  
  // Valorización
  if(insp.valorizacion_reparaciones && insp.valorizacion_reparaciones>0){
    html += '<div class="valor-box">'
    html += '<div style="font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px">Valorización de reparaciones detectadas</div>'
    html += '<div class="valor-num">$'+insp.valorizacion_reparaciones.toLocaleString('es-CL')+'</div>'
    html += '<div class="valor-desc">Monto estimado para dejar el vehículo en óptimo estado</div>'
    html += '</div>'
  }
  html += '</div>'
  
  // Observaciones
  if(insp.observaciones_generales){
    html += '<div class="card">'
    html += '<div class="card-tit">📝 Observaciones del técnico</div>'
    html += '<p style="color:var(--t1);white-space:pre-wrap">'+insp.observaciones_generales+'</p>'
    html += '</div>'
  }
  
  // CATEGORÍAS DETALLADAS
  html += '<div class="card">'
  html += '<div class="card-tit">🔍 Detalle por categoría</div>'
  
  CATALOGO.forEach(function(cat){
    // Contar por categoría
    var cOk=0, cWarn=0, cErr=0, cRev=0
    cat.puntos.forEach(function(p){
      var c = checklist[p.id]
      if(c && c.estado){
        cRev++
        if(c.estado==='ok') cOk++
        else if(c.estado==='warn') cWarn++
        else if(c.estado==='err') cErr++
      }
    })
    
    if(cRev === 0) return // No revisado en este plan
    
    var openClass = cErr > 0 ? 'open' : '' // Abrir automáticamente si hay urgentes
    
    html += '<div class="cat-box '+openClass+'" id="cat-'+cat.num+'">'
    html += '<div class="cat-head" onclick="this.parentElement.classList.toggle(\'open\')">'
    html += '<div class="cat-num">'+cat.num+'</div>'
    html += '<div class="cat-nom">'+cat.icon+' '+cat.nombre+'</div>'
    html += '<div class="cat-est">'
    if(cOk>0) html += '<span class="e-ok">'+cOk+'</span>'
    if(cWarn>0) html += '<span class="e-warn">'+cWarn+'</span>'
    if(cErr>0) html += '<span class="e-err">'+cErr+'</span>'
    html += '</div>'
    html += '<span class="cat-arrow">▼</span>'
    html += '</div>'
    html += '<div class="cat-body">'
    
    cat.puntos.forEach(function(p){
      var c = checklist[p.id]
      if(!c || !c.estado) return
      var iconos = {ok:'✓', warn:'⚠', err:'✕', na:'—'}
      var labels = {ok:'OK', warn:'Atención', err:'Urgente', na:'N/A'}
      html += '<div class="pto">'
      html += '<span class="pto-icono '+c.estado+'">'+iconos[c.estado]+'</span>'
      html += '<div class="pto-nom">'+p.nombre+'</div>'
      html += '<span class="pto-est '+c.estado+'">'+labels[c.estado]+'</span>'
      if(c.nota) html += '<div class="pto-nota">"'+c.nota+'"</div>'
      var fp = fotosPorPunto[p.id] || []
      if(fp.length){
        html += '<div class="pto-fotos">'
        fp.forEach(function(f){
          html += '<img class="pto-foto" src="'+f.url+'" onclick="window.open(\''+f.url+'\',\'_blank\')">'
        })
        html += '</div>'
      }
      html += '</div>'
    })
    
    html += '</div></div>'
  })
  html += '</div>'
  
  // CTA final
  html += '<div class="cta-final">'
  html += '<h3>¿Quieres consultar algo del reporte?</h3>'
  html += '<p>Nuestro equipo técnico está disponible para explicarte cualquier detalle, ayudarte a negociar el precio o coordinar las reparaciones necesarias.</p>'
  var tel = (insp.cliente_telefono||'').replace(/\D/g,'') || '56945210814'
  html += '<a class="btn-wa" href="https://wa.me/56945210814?text=Hola%20Serviruta%2C%20tengo%20una%20consulta%20sobre%20el%20reporte%20'+encodeURIComponent(insp.codigo||insp.id)+'">💬 Hablar con Serviruta</a>'
  html += '</div>'
  
  // Footer
  html += '<div class="foot">'
  html += '<div class="brand">SERVI<span>RUTA</span></div>'
  html += '<div>Peritaje pre-compra profesional · Camiones y maquinaria pesada</div>'
  html += '<div style="margin-top:8px">📱 +56 9 4521 0814 · 🌐 serviruta.cl</div>'
  html += '<div style="margin-top:12px;color:var(--t4)">Reporte generado el '+(insp.fecha_completado?new Date(insp.fecha_completado).toLocaleString('es-CL'):new Date().toLocaleString('es-CL'))+'</div>'
  html += '</div>'
  
  document.getElementById('cont').innerHTML = html
}

function renderBarra(clase, label, num, total){
  var pct = total > 0 ? (num/total*100) : 0
  return '<div class="resumen-barra">'+
    '<div class="resumen-lbl '+clase+'">'+label+'</div>'+
    '<div class="barra-viz"><div class="barra-viz-fill '+clase+'" style="width:'+pct+'%"></div></div>'+
    '<div class="resumen-num">'+num+'</div>'+
  '</div>'
}

cargar()
</script>

</html>
